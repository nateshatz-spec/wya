<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beta Registration | What's Your Anxiety</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0071e3;
            --primary-glow: rgba(0, 113, 227, 0.5);
            --bg: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .aura-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, var(--bg) 100%);
        }

        .register-card {
            background: var(--card-bg);
            padding: 4rem;
            border-radius: 3rem;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(40px);
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-small {
            width: 80px;
            height: 80px;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            letter-spacing: -1.5px;
            background: linear-gradient(to bottom, #fff 40%, rgba(255,255,255,0.4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-dim);
            margin-bottom: 3rem;
            font-weight: 300;
        }

        .input-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--card-border);
            padding: 1.2rem;
            border-radius: 1rem;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .btn {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 1.2rem;
            border-radius: 1rem;
            border: none;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 1rem;
            box-shadow: 0 15px 35px var(--primary-glow);
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px var(--primary-glow);
            background: #0080ff;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-msg {
            margin-top: 1.5rem;
            font-size: 0.95rem;
            min-height: 1.5rem;
        }

        .success { color: #10b981; }
        .error { color: #ef4444; }

        .back-link {
            display: block;
            margin-top: 2.5rem;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-link:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="aura-bg"></div>

    <div class="register-card">
        <img src="logo.png" alt="WYA Logo" class="logo-small">
        <h1>Join the Beta</h1>
        <p>Create your secure account to start using the WYA 3.0 clinical toolkit.</p>

        <form id="registerForm">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="John Doe" required>
            </div>
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>
            <div class="input-group">
                <label for="password">Choose a Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn" id="submitBtn">Create Account</button>
        </form>

        <div id="statusMsg" class="status-msg"></div>

        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const statusMsg = document.getElementById('statusMsg');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Update UI
            submitBtn.disabled = true;
            submitBtn.innerText = 'Creating Account...';
            statusMsg.innerText = '';
            statusMsg.className = 'status-msg';

            try {
                const response = await fetch('https://api.whatsyouranxiety.com/api/v1/auth/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name, email, password }),
                });

                const data = await response.json();

                if (response.ok) {
                    // Smoothly transition to success view
                    const card = document.querySelector('.register-card');
                    card.innerHTML = `
                        <div style="animation: fadeIn 0.8s ease-out;">
                            <div style="font-size: 80px; margin-bottom: 2rem;">✉️</div>
                            <h1 style="background: linear-gradient(to bottom, #fff 40%, rgba(255,255,255,0.4)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Check Your Email</h1>
                            <p style="font-size: 1.1rem; line-height: 1.6; margin-bottom: 2rem;">
                                We've sent a welcome email to <strong>${email}</strong>.<br>
                                It contains your TestFlight link to download the app!
                            </p>
                            <div style="background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 1.5rem; border: 1px solid var(--card-border); margin-bottom: 2rem; font-size: 0.9rem; color: var(--text-dim);">
                                Don't see it? Check your <strong>Spam folder</strong>.
                            </div>
                            <a href="index.html" class="btn" style="text-decoration: none; display: block;">Back to Home</a>
                        </div>
                    `;
                } else {
                    statusMsg.innerText = data.error || 'Registration failed. Please try again.';
                    statusMsg.classList.add('error');
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Create Account';
                }
            } catch (err) {
                statusMsg.innerText = 'Connection error. Please check your internet.';
                statusMsg.classList.add('error');
                submitBtn.disabled = false;
                submitBtn.innerText = 'Create Account';
            }
        });
    </script>
</body>
</html>
